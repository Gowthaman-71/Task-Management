services:
  - type: web
    name: task-manager-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/demo-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FIREBASE_CONFIG_PATH
        value: serviceAccountKey.json
    autoDeploy: true
    
  - type: web
    name: task-manager-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://task-manager-backend.onrender.com
    autoDeploy: true
