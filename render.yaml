services:
  - type: web
    name: task-manager-backend
    env: java
    planId: free
    repo: https://github.com/Gowthaman-71/Task-Management.git
    branch: main
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    autoDeploy: true

  - type: web
    name: task-manager-frontend
    env: docker
    planId: free
    repo: https://github.com/Gowthaman-71/Task-Management.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://task-manager-backend.onrender.com/tasks
    autoDeploy: true